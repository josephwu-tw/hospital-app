{% extends "base.html" %}
{% block title %}{{ action }} Department{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-3 gap-2">
  <a href="/departments" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
  <h2 class="mb-0">{{ action }} Department</h2>
</div>

<div class="card shadow-sm" style="max-width:480px">
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Department Name <span class="text-danger">*</span></label>
        <input type="text" name="deptName" class="form-control" required
               value="{{ dept.deptName if dept else '' }}" placeholder="e.g., Cardiology">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Location</label>
        <input type="text" name="location" class="form-control"
               value="{{ dept.location if dept else '' }}" placeholder="e.g., Floor 3, Wing B">
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Phone</label>
        <input type="text" name="phone" class="form-control"
               value="{{ dept.phone if dept else '' }}" placeholder="e.g., 617-555-0100">
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-success">
          <i class="bi bi-check-lg me-1"></i>{{ action }}
        </button>
        <a href="/departments" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
