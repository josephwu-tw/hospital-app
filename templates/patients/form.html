{% extends "base.html" %}
{% block title %}{{ action }} Patient{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-3 gap-2">
  <a href="/patients" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
  <h2 class="mb-0">{{ action }} Patient</h2>
</div>

<div class="card shadow-sm" style="max-width:640px">
  <div class="card-body">
    <form method="post">
      <h6 class="text-muted mb-3">Personal Information</h6>
      <div class="row g-3">
        <div class="col-sm-6">
          <label class="form-label">First Name <span class="text-danger">*</span></label>
          <input type="text" name="firstName" class="form-control" required
                 value="{{ patient.firstName if patient else '' }}">
        </div>
        <div class="col-sm-6">
          <label class="form-label">Last Name <span class="text-danger">*</span></label>
          <input type="text" name="lastName" class="form-control" required
                 value="{{ patient.lastName if patient else '' }}">
        </div>
        <div class="col-sm-6">
          <label class="form-label">Date of Birth <span class="text-danger">*</span></label>
          <input type="date" name="dateOfBirth" class="form-control" required
                 value="{{ patient.dateOfBirth if patient else '' }}">
        </div>
        <div class="col-sm-6">
          <label class="form-label">Blood Type</label>
          <select name="bloodType" class="form-select">
            <option value="">— unknown —</option>
            {% for bt in ['A+','A-','B+','B-','AB+','AB-','O+','O-'] %}
              <option value="{{ bt }}"
                {% if patient and patient.bloodType == bt %}selected{% endif %}>{{ bt }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-sm-6">
          <label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control"
                 value="{{ patient.phone if patient else '' }}">
        </div>
        <div class="col-sm-6">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control"
                 value="{{ patient.email if patient else '' }}">
        </div>
        <div class="col-12">
          <label class="form-label">Address</label>
          <input type="text" name="address" class="form-control"
                 value="{{ patient.address if patient else '' }}">
        </div>
        <div class="col-12">
          <label class="form-label">Allergies</label>
          <input type="text" name="allergies" class="form-control"
                 value="{{ patient.allergies if patient else '' }}" placeholder="e.g. Penicillin, Peanuts">
        </div>
        <div class="col-12">
          <label class="form-label">Emergency Contact</label>
          <input type="text" name="emergencyContact" class="form-control"
                 value="{{ patient.emergencyContact if patient else '' }}" placeholder="Name and phone">
        </div>
      </div>

      <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg me-1"></i>{{ action }} Patient
        </button>
        <a href="/patients" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
