<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Hospital Management System{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f5f7fa; }
    .navbar-brand { font-weight: 700; letter-spacing: .5px; }
    .stat-card { border-left: 4px solid; border-radius: 6px; }
    .stat-card.blue  { border-color: #0d6efd; }
    .stat-card.green { border-color: #198754; }
    .stat-card.orange{ border-color: #fd7e14; }
    .stat-card.red   { border-color: #dc3545; }
    .stat-card.teal  { border-color: #0dcaf0; }
    table thead { background: #e9ecef; }
    .badge-Scheduled  { background: #0d6efd; }
    .badge-Completed  { background: #198754; }
    .badge-Canceled   { background: #dc3545; }
    .badge-Rescheduled{ background: #fd7e14; }
    .badge-Waiting    { background: #ffc107; color: #000; }
    .badge-Served     { background: #198754; }
    .badge-Paid       { background: #198754; }
    .badge-Unpaid     { background: #dc3545; }
    .badge-Partial    { background: #fd7e14; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="bi bi-hospital-fill me-2"></i>Hospital System</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/patients"><i class="bi bi-people me-1"></i>Patients</a></li>
        <li class="nav-item"><a class="nav-link" href="/appointments"><i class="bi bi-calendar-check me-1"></i>Appointments</a></li>
        <li class="nav-item"><a class="nav-link" href="/doctors"><i class="bi bi-person-badge me-1"></i>Doctors</a></li>
        <li class="nav-item"><a class="nav-link" href="/billing"><i class="bi bi-receipt me-1"></i>Billing</a></li>
        <li class="nav-item"><a class="nav-link" href="/analytics"><i class="bi bi-bar-chart-line me-1"></i>Analytics</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container pb-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
